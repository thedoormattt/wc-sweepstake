<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16201b">
<title>WC26 Sweepstake</title>
<style>
  :root{
    --paper:#f6f4ee; --ink:#1a1a17; --muted:#6f6c63; --faint:#9b978c;
    --line:#e6e2d8; --card:#ffffff;
    --pitch:#1f7a4d; --pitch-deep:#16201b; --pitch-soft:#e7f1ea;
    --clay:#b23a2e; --amber:#dd8413; --amber-soft:#fbeed8;
    --r:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px 64px}
  .tnum{font-variant-numeric:tabular-nums}

  /* Header */
  header{
    background:var(--pitch-deep); color:#f3f1ea;
    padding:calc(env(safe-area-inset-top) + 16px) 0 14px;
    border-bottom:3px solid var(--pitch);
    position:sticky; top:0; z-index:20;
  }
  header .wrap{padding-bottom:0}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{
    font-size:21px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:0;
  }
  .brand .yr{color:var(--pitch);font-weight:800;letter-spacing:.06em}
  .sub{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:12.5px;color:#b9c4bc}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .src-live .dot{background:#46d07f;box-shadow:0 0 0 3px rgba(70,208,127,.18)}
  .src-sample .dot{background:var(--amber)}
  .src-stale .dot{background:var(--clay)}

  /* Section eyebrow */
  .eyebrow{
    font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin:24px 2px 10px;display:flex;align-items:center;gap:8px;
  }
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}

  /* Match card */
  .match{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:11px 13px;margin-bottom:8px;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;
  }
  .side{display:flex;align-items:center;gap:8px;min-width:0}
  .side.away{justify-content:flex-end}
  .side .crest{width:22px;height:22px;object-fit:contain;flex:none}
  .side .tla{font-weight:700;font-size:15px;letter-spacing:.02em}
  .side .full{display:none}
  .center{text-align:center;min-width:54px}
  .score{font-size:20px;font-weight:800;letter-spacing:.02em}
  .ko{font-size:15px;font-weight:700;color:var(--ink)}
  .pill{
    display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    padding:2px 7px;border-radius:999px;margin-bottom:3px;
  }
  .pill.live{background:var(--clay);color:#fff}
  .pill.ft{background:#ece9e0;color:var(--muted)}
  .pill.up{background:var(--pitch-soft);color:var(--pitch)}
  .mstage{grid-column:1/-1;text-align:center;font-size:11px;color:var(--faint);margin-top:2px}
  .empty{color:var(--muted);font-size:14px;background:var(--card);border:1px dashed var(--line);
    border-radius:var(--r);padding:14px;text-align:center}

  /* Person */
  .person{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 13px 6px;margin-bottom:10px}
  .phead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .pname{font-size:17px;font-weight:800;letter-spacing:.01em}
  .lives{display:flex;align-items:center;gap:9px}
  .pips{display:flex;gap:3px}
  .pip{width:8px;height:8px;border-radius:50%;background:var(--pitch)}
  .pip.out{background:transparent;border:1.5px solid var(--line)}
  .pcount{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em}
  .pcount b{color:var(--pitch)}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{
    appearance:none;border:1px solid var(--line);background:#fbfaf6;color:var(--ink);
    border-radius:999px;padding:6px 11px 6px 8px;display:flex;align-items:center;gap:6px;
    font-size:13.5px;font-weight:600;cursor:pointer;transition:transform .05s,border-color .15s;
  }
  .chip:hover{border-color:var(--pitch)}
  .chip:active{transform:scale(.97)}
  .chip .crest{width:16px;height:16px;object-fit:contain;flex:none}
  .chip.out{color:var(--faint);background:transparent;border-style:dashed}
  .chip.out .name{text-decoration:line-through;text-decoration-color:var(--clay)}
  .chip.out .crest{filter:grayscale(1);opacity:.5}
  .chip .mark{font-size:10px;font-weight:800;letter-spacing:.04em}
  .chip.in .mark{color:var(--pitch)}
  .chip.out .mark{color:var(--clay)}
  .chip:focus-visible{outline:2px solid var(--pitch);outline-offset:2px}

  /* Sheet (team detail) */
  .backdrop{position:fixed;inset:0;background:rgba(20,24,20,.5);z-index:40;
    opacity:0;pointer-events:none;transition:opacity .18s}
  .backdrop.open{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:var(--paper);border-radius:18px 18px 0 0;
    max-width:560px;margin:0 auto;max-height:84vh;overflow:auto;
    transform:translateY(100%);transition:transform .22s cubic-bezier(.22,.61,.36,1);
    padding-bottom:calc(env(safe-area-inset-bottom) + 18px);
  }
  .sheet.open{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:99px;background:#d7d2c6;margin:9px auto 0}
  .shead{display:flex;align-items:center;gap:11px;padding:12px 16px 10px;position:sticky;top:0;
    background:var(--paper);border-bottom:1px solid var(--line)}
  .shead .crest{width:30px;height:30px;object-fit:contain;flex:none}
  .shead .nm{font-size:18px;font-weight:800}
  .shead .st{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .st.in{color:var(--pitch)} .st.out{color:var(--clay)}
  .sclose{margin-left:auto;appearance:none;border:1px solid var(--line);background:var(--card);
    border-radius:999px;width:32px;height:32px;font-size:17px;cursor:pointer;color:var(--muted);line-height:1}
  .sbody{padding:6px 16px 0}
  .row{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .rdate{font-size:11px;color:var(--faint);width:58px;flex:none;line-height:1.25}
  .ropp{flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ropp .vs{color:var(--faint);font-weight:600;font-size:12px;margin-right:5px}
  .rres{font-weight:800;font-size:14px;letter-spacing:.03em}
  .wld{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:6px;
    font-size:11px;font-weight:800;color:#fff;flex:none}
  .wld.W{background:var(--pitch)} .wld.D{background:var(--faint)} .wld.L{background:var(--clay)}
  .rlive{font-size:10px;font-weight:800;color:var(--clay);letter-spacing:.06em}
  .subhead{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin:16px 2px 2px}

  footer{margin-top:26px;font-size:11.5px;color:var(--faint);line-height:1.6;text-align:center}
  footer a{color:var(--muted)}
  @media (prefers-reduced-motion:reduce){.sheet,.backdrop{transition:none}}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand"><h1>Sweepstake</h1><span class="yr tnum">WC26</span></div>
    <div class="sub" id="status"><span class="dot"></span><span id="status-text">Loading…</span></div>
  </div>
</header>

<main class="wrap">
  <div class="eyebrow">Today</div>
  <div id="today"></div>

  <div class="eyebrow">The pool</div>
  <div id="people"></div>

  <footer>
    Tap a team for its results &amp; fixtures. “Still in” = the team still has a match to play.<br>
    Data: <a href="https://www.football-data.org" target="_blank" rel="noopener">football-data.org</a>. Times shown in your local timezone.
  </footer>
</main>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Team detail">
  <div class="grab"></div>
  <div class="shead">
    <img class="crest" id="sheet-crest" alt="" hidden>
    <div>
      <div class="nm" id="sheet-name"></div>
      <div class="st" id="sheet-status"></div>
    </div>
    <button class="sclose" id="sheet-close" aria-label="Close">&times;</button>
  </div>
  <div class="sbody" id="sheet-body"></div>
</div>

<script>
/* ---------- The pool (static) ---------- */
const ROSTER = {
  "Matt":    ["New Zealand","Czechia","Bosnia & Herzegovina","Sweden","Uruguay","Switzerland","Portugal","France"],
  "Nikolay": ["Cape Verde","Tunisia","Paraguay","Australia","Turkey","Norway","Belgium","Germany"],
  "Nick":    ["Qatar","Haiti","Algeria","Scotland","Canada","Japan","Brazil","Spain"],
  "Philip":  ["Curacao","Uzbekistan","DR Congo","Egypt","Austria","Colombia","Senegal","Netherlands"],
  "Rob":     ["Iraq","Panama","Iran","Ghana","Ivory Coast","United States","Ecuador","England"],
  "Yue":     ["Jordan","Saudi Arabia","South Africa","South Korea","Morocco","Croatia","Mexico","Argentina"],
};

/* Aliases for names that differ between our list and the data feed. */
const ALIASES = {
  "Czechia":["czech republic"],
  "Bosnia & Herzegovina":["bosnia and herzegovina","bosnia herzegovina"],
  "Cape Verde":["cabo verde"],
  "Turkey":["turkiye"],
  "DR Congo":["congo dr","democratic republic of congo","dr congo"],
  "Iran":["ir iran","islamic republic of iran"],
  "Ivory Coast":["cote d ivoire","cote divoire","ivory coast"],
  "United States":["usa","united states of america"],
  "South Korea":["korea republic","republic of korea"],
  "Curacao":["curacao"],
};

const norm = s => (s||"").toString().toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/[^a-z0-9]+/g," ").trim();

/* identity strings for each roster team */
const IDENT = {};
for(const teams of Object.values(ROSTER))
  for(const t of teams){
    const ids = new Set([norm(t)]);
    (ALIASES[t]||[]).forEach(a=>ids.add(norm(a)));
    IDENT[t] = ids;
  }

const ACTIVE = new Set(["SCHEDULED","TIMED","IN_PLAY","PAUSED"]);
const LIVE = new Set(["IN_PLAY","PAUSED"]);

let MATCHES = [];
let SHORT = {}; // roster team -> a display short name / tla / crest picked from feed

function sideKeys(side){
  return new Set([norm(side.name),norm(side.shortName),norm(side.tla)].filter(Boolean));
}
function matchHasTeam(m,team){
  const ids = IDENT[team]; if(!ids) return false;
  for(const k of sideKeys(m.home)) if(ids.has(k)) return true;
  for(const k of sideKeys(m.away)) if(ids.has(k)) return true;
  return false;
}
function sideIsTeam(side,team){
  const ids = IDENT[team]; if(!ids) return false;
  for(const k of sideKeys(side)) if(ids.has(k)) return true;
  return false;
}
function teamMatches(team){
  return MATCHES.filter(m=>matchHasTeam(m,team))
    .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
}
function teamStatus(team){
  const ms = teamMatches(team);
  if(!ms.length) return "unknown";
  return ms.some(m=>ACTIVE.has(m.status)) ? "in" : "out";
}

/* pull a nice short label + crest for a roster team from whatever side it appears on */
function teamMeta(team){
  if(SHORT[team]) return SHORT[team];
  let meta = {tla:team.slice(0,3).toUpperCase(), crest:null, name:team};
  for(const m of MATCHES){
    for(const s of [m.home,m.away]){
      if(sideIsTeam(s,team)){
        meta = {tla:s.tla||meta.tla, crest:s.crest||null, name:s.name||team};
        SHORT[team]=meta; return meta;
      }
    }
  }
  SHORT[team]=meta; return meta;
}

/* ---------- formatting ---------- */
const fmtTime = d => d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
const fmtDay  = d => d.toLocaleDateString([], {weekday:"short",day:"numeric",month:"short"});
const fmtShort= d => d.toLocaleDateString([], {day:"numeric",month:"short"});
const sameDay = (a,b)=>a.toDateString()===b.toDateString();
const stageLabel = m => {
  if(m.group) return "Grp " + m.group.replace("GROUP_","").replace("Group ","");
  return (m.stage||"").replace(/_/g," ").toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
};
const teamLabel = s => s.tla || s.shortName || s.name || "TBD";

function crestImg(url,cls){
  if(!url) return "";
  return `<img class="${cls}" src="${url}" alt="" loading="lazy" onerror="this.style.display='none'">`;
}

/* ---------- render: today ---------- */
function renderToday(){
  const el = document.getElementById("today");
  const now = new Date();
  let list = MATCHES
    .map(m=>({m,d:new Date(m.utcDate)}))
    .filter(x=>sameDay(x.d,now))
    .sort((a,b)=>a.d-b.d);

  if(!list.length){
    const next = MATCHES.map(m=>({m,d:new Date(m.utcDate)}))
      .filter(x=>ACTIVE.has(x.m.status) && x.d>now)
      .sort((a,b)=>a.d-b.d)[0];
    el.innerHTML = `<div class="empty">No matches today.${
      next ? ` Next up: <b>${teamLabel(next.m.home)} v ${teamLabel(next.m.away)}</b>, ${fmtDay(next.d)} ${fmtTime(next.d)}.` : ""
    }</div>`;
    return;
  }
  el.innerHTML = list.map(({m,d})=>matchCard(m,d)).join("");
}

function matchCard(m,d){
  const live = LIVE.has(m.status), ft = m.status==="FINISHED";
  let pill, center;
  if(live){ pill=`<span class="pill live">Live</span>`;
    center=`<div class="score tnum">${m.homeScore??0}–${m.awayScore??0}</div>`; }
  else if(ft){ pill=`<span class="pill ft">FT</span>`;
    center=`<div class="score tnum">${m.homeScore??0}–${m.awayScore??0}</div>`; }
  else { pill=`<span class="pill up">${fmtTime(d)}</span>`;
    center=`<div class="ko tnum">${fmtTime(d)}</div>`; }
  return `<div class="match">
    <div class="side home">${crestImg(m.home.crest,"crest")}<span class="tla">${teamLabel(m.home)}</span></div>
    <div class="center">${pill}${center}</div>
    <div class="side away"><span class="tla">${teamLabel(m.away)}</span>${crestImg(m.away.crest,"crest")}</div>
    <div class="mstage">${stageLabel(m)}</div>
  </div>`;
}

/* ---------- render: people ---------- */
function renderPeople(){
  const el = document.getElementById("people");
  el.innerHTML = Object.entries(ROSTER).map(([person,teams])=>{
    const statuses = teams.map(teamStatus);
    const inCount = statuses.filter(s=>s!=="out").length;
    const pips = statuses.map(s=>`<span class="pip ${s==="out"?"out":""}"></span>`).join("");
    const chips = teams.map((t,i)=>chip(t,statuses[i])).join("");
    return `<section class="person">
      <div class="phead">
        <div class="pname">${person}</div>
        <div class="lives">
          <div class="pips">${pips}</div>
          <div class="pcount"><b>${inCount}</b>/8 in</div>
        </div>
      </div>
      <div class="chips">${chips}</div>
    </section>`;
  }).join("");

  document.querySelectorAll(".chip").forEach(c=>{
    c.addEventListener("click",()=>openSheet(c.dataset.team));
  });
}

function chip(team,status){
  const meta = teamMeta(team);
  const out = status==="out";
  const mark = out ? "OUT" : "IN";
  return `<button class="chip ${out?"out":"in"}" data-team="${team}">
    ${crestImg(meta.crest,"crest")}
    <span class="name">${team}</span>
    <span class="mark">${mark}</span>
  </button>`;
}

/* ---------- render: team sheet ---------- */
function openSheet(team){
  const meta = teamMeta(team);
  const status = teamStatus(team);
  document.getElementById("sheet-name").textContent = team;
  const st = document.getElementById("sheet-status");
  st.textContent = status==="out" ? "Eliminated" : status==="in" ? "Still in" : "No fixtures found";
  st.className = "st " + (status==="out"?"out":"in");
  const crest = document.getElementById("sheet-crest");
  if(meta.crest){ crest.src=meta.crest; crest.hidden=false; } else { crest.hidden=true; }

  const ms = teamMatches(team);
  const played = ms.filter(m=>m.status==="FINISHED" || LIVE.has(m.status));
  const upcoming = ms.filter(m=>m.status==="SCHEDULED" || m.status==="TIMED");
  let html = "";

  if(played.length){
    html += `<div class="subhead">Results</div>`;
    html += played.map(m=>resultRow(m,team)).join("");
  }
  if(upcoming.length){
    html += `<div class="subhead">Fixtures</div>`;
    html += upcoming.map(m=>fixtureRow(m,team)).join("");
  }
  if(!ms.length) html = `<div class="empty" style="margin:14px 0">No matches found for ${team}.</div>`;

  document.getElementById("sheet-body").innerHTML = html;
  document.getElementById("backdrop").classList.add("open");
  document.getElementById("sheet").classList.add("open");
  document.body.style.overflow="hidden";
}

function perspective(m,team){
  const home = sideIsTeam(m.home,team);
  const opp = home ? m.away : m.home;
  const us = home ? m.homeScore : m.awayScore;
  const them = home ? m.awayScore : m.homeScore;
  return {home,opp,us,them};
}
function resultRow(m,team){
  const {home,opp,us,them} = perspective(m,team);
  const live = LIVE.has(m.status);
  let wld="D";
  if(us>them) wld="W"; else if(us<them) wld="L";
  const d = new Date(m.utcDate);
  return `<div class="row">
    <div class="rdate">${fmtShort(d)}<br>${stageLabel(m)}</div>
    <div class="ropp"><span class="vs">${home?"v":"@"}</span>${crestTiny(opp)}${opp.shortName||opp.name||opp.tla}</div>
    ${live?`<span class="rlive">LIVE</span>`:""}
    <div class="rres tnum">${us??0}–${them??0}</div>
    ${live?"":`<span class="wld ${wld}">${wld}</span>`}
  </div>`;
}
function fixtureRow(m,team){
  const {home,opp} = perspective(m,team);
  const d = new Date(m.utcDate);
  return `<div class="row">
    <div class="rdate">${fmtShort(d)}<br>${fmtTime(d)}</div>
    <div class="ropp"><span class="vs">${home?"v":"@"}</span>${crestTiny(opp)}${opp.shortName||opp.name||opp.tla}</div>
    <div class="rres" style="color:var(--faint);font-weight:600;font-size:12px">${stageLabel(m)}</div>
  </div>`;
}
function crestTiny(side){
  return side.crest ? `<img src="${side.crest}" alt="" style="width:15px;height:15px;object-fit:contain;vertical-align:-2px;margin-right:6px" onerror="this.style.display='none'">` : "";
}

function closeSheet(){
  document.getElementById("backdrop").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  document.body.style.overflow="";
}
document.getElementById("backdrop").addEventListener("click",closeSheet);
document.getElementById("sheet-close").addEventListener("click",closeSheet);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSheet(); });

/* ---------- status bar ---------- */
function setStatus(source,updated){
  const bar = document.getElementById("status");
  bar.className = "sub src-"+(source||"");
  const t = updated ? new Date(updated*1000) : new Date();
  const map = {live:"Live data", sample:"Sample data — set FOOTBALL_DATA_TOKEN for live",
    stale:"Showing last good data", error:"Feed error — check token", "":"Loading…"};
  document.getElementById("status-text").textContent =
    (map[source]||"Updated") + " · " + fmtTime(t);
}

/* ---------- load ---------- */
async function load(){
  try{
    const r = await fetch("/api/matches");
    const j = await r.json();
    MATCHES = j.matches||[];
    SHORT = {};
    setStatus(j.source, j.updated);
    renderToday(); renderPeople();
  }catch(e){
    document.getElementById("status-text").textContent = "Couldn’t reach the server — retrying…";
  }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
